Hello, I am a lecturer and researcher whose work focuses on the intersection of Artificial Intelligence, Applied Data Science, 
and Large Language Models (LLMs) for data-driven learning and education. I am particularly interested in leveraging LLMs, educational data, 
and computational approaches to support learning analytics, improve learning performance, and develop innovative AI-assisted educational systems.
"""

